name: build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Download and Prepare Skia
      shell: powershell
      run: |
        # 设置 TLS 1.2 确保安全连接稳定
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        
        $url = "https://github.com/aseprite/skia/releases/download/m102-861e474335/Skia-Windows-Release-x64.zip"
        $backupUrl = "https://github.com/blueloveTH/aseprite/releases/download/v0.01/skia.zip"
        
        Write-Host "正在从主源下载 Skia..."
        try {
            Invoke-WebRequest -Uri $url -OutFile skia.zip -ErrorAction Stop
            if ((Get-Item skia.zip).Length -lt 10MB) { throw "文件大小异常" }
        } catch {
            Write-Warning "主源下载失败，尝试备用源..."
            Invoke-WebRequest -Uri $backupUrl -OutFile skia.zip
        }

        Write-Host "正在解压 Skia..."
        Expand-Archive -Path skia.zip -DestinationPath .\skia -Force
        
        # 验证关键库文件是否存在
        if (-not (Test-Path ".\skia\out\Release-x64\skia.lib")) {
            throw "找不到 skia.lib，请检查解压路径是否正确"
        }

    - name: Run CMake Configuration
      shell: powershell
      run: |
        if (-not (Test-Path "build")) { mkdir build }
        $skia_path = "$(Get-Location)\skia"
        
        # 使用 PowerShell 的绝对路径传递，避免 CMake 找不到库
        cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DENABLE_UI=ON `
          -DLAF_BACKEND=skia `
          -DSKIA_DIR="$skia_path" `
          -DSKIA_LIBRARY_DIR="$skia_path\out\Release-x64" `
          -DSKIA_LIBRARY="$skia_path\out\Release-x64\skia.lib"

    - name: Build Aseprite
      shell: powershell
      run: |
        cd build
        ninja aseprite

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-windows-build
        path: |
          build/bin/data
          build/bin/aseprite.exe
