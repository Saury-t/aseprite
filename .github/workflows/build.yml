name: build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Download Skia
      shell: powershell
      run: |
        $url = "https://github.com/aseprite/skia/releases/download/m102-861e474335/Skia-Windows-Release-x64.zip"
        # Download using native bits
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri $url -OutFile skia.zip
        
        # Extract
        Expand-Archive -Path skia.zip -DestinationPath .\skia -Force

    - name: Run CMake Configuration
      shell: powershell
      run: |
        if (-not (Test-Path "build")) { mkdir build }
        $skia_path = "$(Get-Location)\skia"
        
        # Use quotes for paths to avoid any space/character issues
        cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DENABLE_UI=ON `
          -DLAF_BACKEND=skia `
          -DSKIA_DIR="$skia_path" `
          -DSKIA_LIBRARY_DIR="$skia_path\out\Release-x64" `
          -DSKIA_LIBRARY="$skia_path\out\Release-x64\skia.lib"

    - name: Build Aseprite
      shell: powershell
      run: |
        cd build
        ninja aseprite

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-win-x64
        path: |
          build/bin/data
          build/bin/aseprite.exe
