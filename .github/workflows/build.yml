name: build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Download Skia
      shell: powershell
      run: |
        # 人肉确认过的真实链接：增加了 -v143 后缀
        $url = "https://github.com/aseprite/skia/releases/download/m102-861e474335/Skia-Windows-Release-x64-v143.zip"
        
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "Downloading Skia from $url"
        
        # 使用 curl.exe 配合 -f 参数，如果 404 会直接报错，不会静默失败
        curl.exe -f -L $url -o skia.zip
        
        Write-Host "Extracting Skia..."
        Expand-Archive -Path skia.zip -DestinationPath .\skia -Force

    - name: Run CMake Configuration
      shell: powershell
      run: |
        if (-not (Test-Path "build")) { mkdir build }
        $skia_path = "$(Get-Location)\skia"
        
        cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DENABLE_UI=ON `
          -DLAF_BACKEND=skia `
          -DSKIA_DIR="$skia_path" `
          -DSKIA_LIBRARY_DIR="$skia_path/out/Release-x64" `
          -DSKIA_LIBRARY="$skia_path/out/Release-x64/skia.lib"

    - name: Build Aseprite
      shell: powershell
      run: |
        cd build
        # 限制只编译主程序，提高成功率
        ninja aseprite

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-win-x64
        path: |
          build/bin/data
          build/bin/aseprite.exe
