name: build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Download Skia using GitHub CLI
      shell: powershell
      env:
        # 使用 GitHub 提供的令牌来确保下载权限和速率限制
        GH_TOKEN: ${{ github.token }}
      run: |
        # 使用 gh 命令行工具下载，指定 tag 且模糊匹配 Windows 的压缩包
        gh release download m102-861e474335 `
          --repo aseprite/skia `
          --pattern "Skia-Windows-Release-x64*.zip" `
          --output skia.zip `
          --clobber
        
        # 确认下载到了真正的文件（必须大于 100MB）
        if ((Get-Item skia.zip).Length -lt 100MB) {
            throw "Downloaded file is too small. Check the release asset name."
        }
        
        Expand-Archive -Path skia.zip -DestinationPath .\skia -Force

    - name: Run CMake Configuration
      shell: powershell
      run: |
        if (-not (Test-Path "build")) { mkdir build }
        $skia_path = "$(Get-Location)\skia"
        
        cmake -S . -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DENABLE_UI=ON `
          -DLAF_BACKEND=skia `
          -DSKIA_DIR="$skia_path" `
          -DSKIA_LIBRARY_DIR="$skia_path/out/Release-x64" `
          -DSKIA_LIBRARY="$skia_path/out/Release-x64/skia.lib"

    - name: Build Aseprite
      shell: powershell
      run: |
        cd build
        ninja aseprite

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite-portable
        path: |
          build/bin/data
          build/bin/aseprite.exe
